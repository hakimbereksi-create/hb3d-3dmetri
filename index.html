<script>
// EMAILJS 15s APRÈS CHARGEMENT (100% FIABLE)
setTimeout(() => {
  // VÉRIFIE process récent (logs après 5s)
  if(document.body.textContent.includes('File Uploaded') && 
     Date.now() - document.lastActivity > 5000) {
    
    console.log("⏱️ 15s → EmailJS avec données complètes !");
    
    // EXTRAIT les DERNIERS logs (les plus récents)
    const recentLogs = Array.from(document.body.textContent.match(/productName: '[^']+'|https:\/\/buy\.stripe\.com\/test_[^\s]+|object_key: '[^']+'|File Uploaded/g) || []).slice(-10);
    
    const productMatch = recentLogs.find(l => l.includes('productName'));
    const stripeMatch = recentLogs.find(l => l.includes('stripe.com'));
    const fileMatch = recentLogs.find(l => l.includes('object_key'));
    
    const clientEmail = productMatch ? productMatch.match(/'([^']+)'/)[1] : 'Client';
    const stripeLink = stripeMatch || 'Stripe OK';
    const fichier = fileMatch ? fileMatch.match(/'([^']+)'/)[1] : 'STL';
    
    emailjs.send("service_np51rgo", "template_7mjwzt9", {
      from_name: '🚀 3DMetri HB3D FINAL',
      to_email: 'hbereksi@hb3d.fr',
      client_email: clientEmail,
      fichier: fichier,
      prix: '31.11€',
      stripe_link: stripeLink,
      message: `DEVIS COMPLET:\n👤 ${clientEmail}\n📄 ${fichier}\n💰 31.11€\n🔗 ${stripeLink}`
    }).then(() => {
      console.log(`✅ ✅ ✅ DEVIS FINAL ${clientEmail} → hbereksi@hb3d.fr !`);
    }).catch(e => {
      console.error("EmailJS ERROR:", e);
    });
  }
}, 15000); // 15 SECONDES = TOUT TERMINÉ

// Reset pour prochain client
document.lastActivity = Date.now();
console.log("🚀 15s BULLET-PROOF = ACTIVÉ !");
</script>
